<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenVoiceAI 禪音智友 - 無障礙語音助手</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <nav class="nav-buttons">
            <button class="nav-btn active" data-target="http://127.0.0.1:5000" data-id="1">1. 智能語音MP3播放</button>
            <button class="nav-btn" data-target="http://127.0.0.1:8001" data-id="2">2. Cbeta名詞查詢</button>
            <button class="nav-btn" data-target="http://localhost:5173/?view=converter" data-id="3">3. 文字轉檔語音</button>
            <button class="nav-btn" data-target="http://localhost:5173/?view=dictionary" data-id="4">4. 發音校正字典</button>
            <button class="nav-btn" data-target="http://localhost:5173/player/index.html" data-id="5">5. 逐行朗讀文字</button>
        </nav>

        <div class="tools-section">
            <button id="btn-tutorial" class="tool-btn" aria-label="開啟操作教學">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M11,18H13V16H11V18M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,6A4,4 0 0,0 8,10H10A2,2 0 0,1 12,8A2,2 0 0,1 14,10C14,12 11,11.75 11,15H13C13,12.75 16,12.5 16,10A4,4 0 0,0 12,6Z" /></svg>
                <span>操作教學</span>
            </button>
        </div>
    </header>

    <main class="app-layout">
        <!-- 左側固定欄 -->
        <section class="left-section">
            <!-- 功能說明區 -->
            <div id="function-explanation" class="app-branding">
                <!-- JS 動態寫入內容 -->
            </div>
            
            <!-- 全域摘錄筆記區 -->
            <div class="notes-container">
                <div class="notes-header">
                    <h2>📝 摘錄筆記區</h2>
                    <button id="btn-export-notes" class="action-btn">匯出筆記</button>
                </div>
                <div class="notes-body scrollable" id="notesArea">
                    （目前尚未圈選任何重點，請在右側文字區圈選後，系統會自動摘錄至此）
                </div>
            </div>
        </section>

        <!-- 右側動態內容區 -->
        <section class="right-section">
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p>正在為您準備服務，請稍候...</p>
            </div>
            <iframe id="service-frame" src="http://127.0.0.1:5000" frameborder="0" title="Service Content"></iframe>
        </section>
    </main>

    <!-- 操作教學彈出視窗 -->
    <div id="tutorial-modal" class="modal-overlay" aria-hidden="true">
        <!-- 原本的教學內容 -->
        <div class="modal-content" role="dialog" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title">如何使用 ZenVoice AI 禪音智友？</h2>
                <button id="btn-close-modal" class="close-btn" aria-label="關閉視窗">&times;</button>
            </div>
            <div class="modal-body">
                <p class="tutorial-intro">只需三個步驟，就能輕鬆聽佛經：</p>
                <div class="tutorial-steps">
                    <div class="step-card">
                        <div class="step-num">1</div>
                        <h3>喚醒</h3>
                        <p>對著麥克風說出：<br><strong>「小佛」</strong></p>
                    </div>
                    <div class="step-arrow">→</div>
                    <div class="step-card">
                        <div class="step-num">2</div>
                        <h3>播放</h3>
                        <p>接著說出您想聽的經文：<br><strong>「念《心經》」</strong></p>
                    </div>
                    <div class="step-arrow">→</div>
                    <div class="step-card">
                        <div class="step-num">3</div>
                        <h3>控制</h3>
                        <p>隨時用語音調整：<br><strong>「慢一點」</strong> 或 <strong>「暫停」</strong></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
